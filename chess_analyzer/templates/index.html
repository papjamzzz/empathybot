<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f13">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chess Analyzer</title>
  <style>
    :root {
      --bg:          #0f0f13;
      --surface:     #1a1a24;
      --surface2:    #22222f;
      --border:      #2e2e42;
      --accent:      #b794f4;
      --accent-glow: rgba(183,148,244,0.15);
      --text:        #e2e8f0;
      --muted:       #7c8a9e;
      --light-sq:    #f0d9b5;
      --dark-sq:     #b58863;
      --from-sq:     #cdd26a;
      --to-sq:       #aaa23a;
      --error-bg:    rgba(252,129,129,0.08);
      --error:       #fc8181;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      padding-bottom: 3rem;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-icon { font-size: 1.75rem; line-height: 1; }
    .header-text h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-text p  { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

    /* ── Layout ── */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    /* ── Upload area ── */
    .upload-area {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 2.25rem 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .upload-area:hover  { border-color: var(--accent); background: var(--accent-glow); }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      font-size: 0; /* suppress iOS tooltip */
    }
    .upload-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .upload-area h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.35rem; }
    .upload-area p  { font-size: 0.82rem; color: var(--muted); }

    /* ── Preview ── */
    #preview-wrap {
      display: none;
      position: relative;
      margin-top: 1rem;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    #preview {
      display: block;
      width: 100%;
      max-height: 320px;
      object-fit: contain;
    }
    #clear-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(15,15,19,0.75);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem 1.25rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #0f0f13;
      margin-top: 1rem;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 0.75rem;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Loading ── */
    #loading {
      display: none;
      text-align: center;
      padding: 2.5rem 1rem;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 0.9rem; }
    #loading .sub { font-size: 0.78rem; margin-top: 0.25rem; }

    /* ── Error ── */
    #error-box {
      display: none;
      background: var(--error-bg);
      border: 1px solid rgba(252,129,129,0.25);
      color: var(--error);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* ── Results ── */
    #results { display: none; margin-top: 1.5rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .card-header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .card-body { padding: 1.25rem; }

    /* Move card */
    .turn-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-glow);
      border: 1px solid rgba(183,148,244,0.3);
      color: var(--accent);
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.9rem;
    }
    .best-move {
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .move-squares {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.35rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Board */
    .board-wrap {
      display: flex;
      justify-content: center;
      padding: 1rem 0.75rem 0.5rem;
    }
    .board-outer { display: flex; flex-direction: column; }
    .board-row   { display: flex; align-items: center; }
    .rank-lbl {
      width: 18px;
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
    }
    .file-row {
      display: flex;
      padding-left: 18px;
      margin-top: 4px;
    }
    .file-lbl {
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
    }

    .sq {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* size set by JS */
    }
    .sq-light { background: var(--light-sq); }
    .sq-dark  { background: var(--dark-sq);  }
    .sq-from  { background: var(--from-sq) !important; }
    .sq-to    { background: var(--to-sq)   !important; }

    .piece {
      line-height: 1;
      user-select: none;
      position: relative;
      z-index: 1;
    }
    .piece-white { color: #fff;   text-shadow: 0 0 3px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.8); }
    .piece-black { color: #111;   text-shadow: 0 0 3px rgba(255,255,255,0.4); }

    /* dot for empty "to" square when no piece there */
    .sq-to-dot::after {
      content: '';
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
    }

    /* Explanation */
    .explanation { font-size: 0.95rem; line-height: 1.65; color: var(--text); }
    .fen-text {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: 'SF Mono','Fira Code', monospace;
      word-break: break-all;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">♟</div>
  <div class="header-text">
    <h1>Chess Analyzer</h1>
    <p>AI-powered best-move suggestions</p>
  </div>
</header>

<div class="container">

  <!-- Upload -->
  <div class="upload-area" id="upload-area">
    <input type="file" id="file-input" accept="image/*" capture="environment">
    <div class="upload-icon">📷</div>
    <h2>Take a photo of the board</h2>
    <p>Or tap to choose from your gallery</p>
  </div>

  <!-- Preview -->
  <div id="preview-wrap">
    <img id="preview" src="" alt="Chess board preview">
    <button id="clear-btn" title="Remove photo" aria-label="Remove photo">×</button>
  </div>

  <!-- Analyze button -->
  <button class="btn btn-primary" id="analyze-btn" disabled>Analyze Board</button>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Analyzing board position…</p>
    <p class="sub">This takes about 5–10 seconds</p>
  </div>

  <!-- Error -->
  <div id="error-box"></div>

  <!-- Results -->
  <div id="results">

    <!-- Best move -->
    <div class="card">
      <div class="card-header">Best Move</div>
      <div class="card-body">
        <div class="turn-badge" id="turn-badge"></div>
        <div class="best-move" id="best-move"></div>
        <div class="move-squares" id="move-squares"></div>
      </div>
    </div>

    <!-- Board visualization -->
    <div class="card">
      <div class="card-header">Board Position</div>
      <div class="board-wrap">
        <div class="board-outer" id="board-outer"></div>
      </div>
    </div>

    <!-- Analysis -->
    <div class="card">
      <div class="card-header">Analysis</div>
      <div class="card-body">
        <p class="explanation" id="explanation"></p>
        <p class="fen-text" id="fen-display"></p>
      </div>
    </div>

    <button class="btn btn-outline" id="new-btn">Analyze Another Position</button>
  </div>

</div>

<script>
  const PIECES_MAP = {
    'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
    'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟'
  };

  let selectedFile = null;

  const fileInput   = document.getElementById('file-input');
  const previewWrap = document.getElementById('preview-wrap');
  const preview     = document.getElementById('preview');
  const clearBtn    = document.getElementById('clear-btn');
  const analyzeBtn  = document.getElementById('analyze-btn');
  const loading     = document.getElementById('loading');
  const errorBox    = document.getElementById('error-box');
  const results     = document.getElementById('results');

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    preview.src = URL.createObjectURL(file);
    previewWrap.style.display = 'block';
    analyzeBtn.disabled = false;
    hide(results);
    hide(errorBox);
  });

  clearBtn.addEventListener('click', reset);
  document.getElementById('new-btn').addEventListener('click', reset);

  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    analyzeBtn.disabled = true;
    show(loading);
    hide(results);
    hide(errorBox);

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const res  = await fetch('/api/analyze', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok || data.error) throw new Error(data.error || 'Analysis failed');

      renderResults(data);
    } catch (err) {
      showError(err.message || 'Something went wrong. Please try again.');
    } finally {
      hide(loading);
      analyzeBtn.disabled = false;
    }
  });

  function renderResults(data) {
    // Turn badge
    const isWhite = (data.turn || 'white') === 'white';
    const badge = document.getElementById('turn-badge');
    badge.textContent = `${isWhite ? '♔' : '♚'} ${isWhite ? 'White' : 'Black'} to move`;

    // Best move
    document.getElementById('best-move').textContent = data.move;
    const sq = document.getElementById('move-squares');
    sq.textContent = (data.from && data.to) ? `${data.from.toUpperCase()} → ${data.to.toUpperCase()}` : '';

    // Board
    renderBoard(data.fen, data.from, data.to);

    // Explanation + FEN
    document.getElementById('explanation').textContent = data.explanation;
    document.getElementById('fen-display').textContent = 'FEN: ' + data.fen;

    show(results);
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderBoard(fen, fromSq, toSq) {
    const rows    = parseFen(fen);
    const fromIdx = sqToIdx(fromSq);
    const toIdx   = sqToIdx(toSq);

    // Responsive square size
    const maxW = Math.min(window.innerWidth - 80, 360);
    const sqSz = Math.floor(maxW / 8);
    const pxSz = sqSz + 'px';

    const outer = document.getElementById('board-outer');
    outer.innerHTML = '';

    for (let r = 0; r < 8; r++) {
      const row = document.createElement('div');
      row.className = 'board-row';

      const rl = document.createElement('div');
      rl.className = 'rank-lbl';
      rl.style.height = pxSz;
      rl.textContent = 8 - r;
      row.appendChild(rl);

      for (let f = 0; f < 8; f++) {
        const sq = document.createElement('div');
        sq.className = 'sq ' + ((r + f) % 2 === 0 ? 'sq-light' : 'sq-dark');
        sq.style.width  = pxSz;
        sq.style.height = pxSz;

        const isFrom = fromIdx && fromIdx.r === r && fromIdx.f === f;
        const isTo   = toIdx   && toIdx.r   === r && toIdx.f   === f;
        if (isFrom) sq.classList.add('sq-from');
        if (isTo)   sq.classList.add('sq-to');

        const piece = rows[r][f];
        if (piece) {
          const span = document.createElement('span');
          span.className = 'piece ' + (piece === piece.toUpperCase() ? 'piece-white' : 'piece-black');
          span.style.fontSize = Math.floor(sqSz * 0.72) + 'px';
          span.textContent = PIECES_MAP[piece] || '';
          sq.appendChild(span);
        } else if (isTo) {
          sq.classList.add('sq-to-dot');
        }

        row.appendChild(sq);
      }
      outer.appendChild(row);
    }

    // File labels
    const fileRow = document.createElement('div');
    fileRow.className = 'file-row';
    for (const f of ['a','b','c','d','e','f','g','h']) {
      const lbl = document.createElement('div');
      lbl.className = 'file-lbl';
      lbl.style.width = pxSz;
      lbl.textContent = f;
      fileRow.appendChild(lbl);
    }
    outer.appendChild(fileRow);
  }

  function parseFen(fen) {
    const grid = [];
    const position = fen.split(' ')[0];
    for (const rowStr of position.split('/')) {
      const rank = [];
      for (const ch of rowStr) {
        if (/\d/.test(ch)) {
          for (let i = 0; i < parseInt(ch); i++) rank.push('');
        } else {
          rank.push(ch);
        }
      }
      grid.push(rank);
    }
    return grid;
  }

  function sqToIdx(sq) {
    if (!sq || sq.length < 2) return null;
    const f = sq.toLowerCase().charCodeAt(0) - 97;
    const r = 8 - parseInt(sq[1]);
    if (f < 0 || f > 7 || r < 0 || r > 7) return null;
    return { r, f };
  }

  function show(el) { el.style.display = 'block'; }
  function hide(el) { el.style.display = 'none'; }

  function showError(msg) {
    errorBox.textContent = '⚠ ' + msg;
    show(errorBox);
  }

  function reset() {
    selectedFile = null;
    preview.src = '';
    previewWrap.style.display = 'none';
    analyzeBtn.disabled = true;
    fileInput.value = '';
    hide(results);
    hide(errorBox);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
