<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f13">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chess Analyzer</title>
  <style>
    :root {
      --bg:          #0f0f13;
      --surface:     #1a1a24;
      --surface2:    #22222f;
      --border:      #2e2e42;
      --accent:      #b794f4;
      --accent-glow: rgba(183,148,244,0.15);
      --text:        #e2e8f0;
      --muted:       #7c8a9e;
      --light-sq:    #f0d9b5;
      --dark-sq:     #b58863;
      --from-sq:     #cdd26a;
      --to-sq:       #aaa23a;
      --error-bg:    rgba(252,129,129,0.08);
      --error:       #fc8181;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 2rem);
      padding-bottom: max(env(safe-area-inset-bottom), 2rem);
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      padding-top: max(1rem, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-icon { font-size: 1.75rem; line-height: 1; }
    .header-text h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-text p  { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

    /* ── Layout ── */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    /* ── Upload area ── */
    .upload-area {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 2rem 1.25rem 1.5rem;
      text-align: center;
    }
    .upload-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .upload-area h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.35rem; }
    .upload-area > p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; }

    .upload-btns { display: flex; gap: 0.75rem; }
    .upload-btn {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .upload-btn:active { background: var(--accent-glow); border-color: var(--accent); }
    .upload-btn input[type="file"] {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }
    .upload-btn .btn-icon { font-size: 1.5rem; line-height: 1; pointer-events: none; }
    .upload-btn .btn-lbl  { font-size: 0.78rem; font-weight: 600; color: var(--text); pointer-events: none; }

    /* ── Preview ── */
    #preview-wrap {
      display: none;
      position: relative;
      margin-top: 1rem;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    #preview {
      display: block;
      width: 100%;
      max-height: 320px;
      object-fit: contain;
    }
    #clear-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(15,15,19,0.75);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem 1.25rem;
      min-height: 44px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
    }
    .btn-primary { background: var(--accent); color: #0f0f13; margin-top: 1rem; }
    .btn-primary:active:not(:disabled) { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 0.75rem;
    }
    .btn-outline:active { border-color: var(--accent); color: var(--accent); }

    /* ── Loading ── */
    #loading { display: none; text-align: center; padding: 2.5rem 1rem; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 0.9rem; }
    #loading .sub { font-size: 0.78rem; margin-top: 0.25rem; }

    /* ── Error ── */
    #error-box {
      display: none;
      background: var(--error-bg);
      border: 1px solid rgba(252,129,129,0.25);
      color: var(--error);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* ── Results ── */
    #results { display: none; margin-top: 1.5rem; }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 1rem;
    }
    .mode-btn {
      flex: 1;
      padding: 0.55rem;
      min-height: 44px;
      border: none;
      border-radius: 9px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
    }
    .mode-btn.active { background: var(--accent); color: #0f0f13; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .card-header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .card-body { padding: 1.25rem; }

    /* Turn badge */
    .turn-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-glow);
      border: 1px solid rgba(183,148,244,0.3);
      color: var(--accent);
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.9rem;
    }

    /* Analysis move view */
    #analysis-view .best-move {
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    #analysis-view .move-squares {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.35rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Tutorial step view */
    #tutorial-view { display: none; }
    #tutorial-view .step-number {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    #tutorial-view .step-instruction {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }
    #tutorial-view .step-notation {
      font-size: 0.82rem;
      color: var(--muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-top: 0.35rem;
    }

    /* Board — full width, no side padding */
    .board-wrap {
      padding: 0.75rem 0 0.5rem;
      display: flex;
      justify-content: center;
    }
    /* Relative container so SVG arrow can overlay the board */
    .board-svg-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    #board-arrow {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      display: none;
    }
    .board-outer { display: flex; flex-direction: column; }
    .board-row   { display: flex; align-items: center; }
    .rank-lbl {
      width: 18px;
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
    }
    .file-row {
      display: flex;
      padding-left: 18px;
      margin-top: 4px;
    }
    .file-lbl {
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
    }

    .sq {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .sq-light { background: var(--light-sq); }
    .sq-dark  { background: var(--dark-sq); }
    .sq-from  { background: var(--from-sq) !important; }
    .sq-to    { background: var(--to-sq) !important; }

    /* Pulse the destination square in tutorial mode */
    @keyframes sq-pulse {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.25); }
    }
    .tutorial-active .sq-to { animation: sq-pulse 1.4s ease-in-out infinite; }

    .piece {
      line-height: 1;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      z-index: 1;
    }
    .piece-white { color: #fff; text-shadow: 0 0 3px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.8); }
    .piece-black { color: #111; text-shadow: 0 0 3px rgba(255,255,255,0.4); }

    .sq-to-dot::after {
      content: '';
      position: absolute;
      top: 22%; right: 22%; bottom: 22%; left: 22%;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
    }

    /* Explanation */
    .explanation { font-size: 0.95rem; line-height: 1.65; color: var(--text); }
    .fen-text {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: 'SF Mono','Fira Code', monospace;
      word-break: break-all;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">♟</div>
  <div class="header-text">
    <h1>Chess Analyzer</h1>
    <p>AI-powered best-move suggestions</p>
  </div>
</header>

<div class="container">

  <!-- Upload -->
  <div class="upload-area" id="upload-area">
    <div class="upload-icon">♟</div>
    <h2>Photograph your chessboard</h2>
    <p>Point the camera straight down at the board</p>
    <div class="upload-btns">
      <div class="upload-btn">
        <input type="file" id="camera-input" accept="image/*" capture="environment">
        <span class="btn-icon">📷</span>
        <span class="btn-lbl">Camera</span>
      </div>
      <div class="upload-btn">
        <input type="file" id="gallery-input" accept="image/*">
        <span class="btn-icon">🖼</span>
        <span class="btn-lbl">Gallery</span>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div id="preview-wrap">
    <img id="preview" src="" alt="Chess board preview">
    <button id="clear-btn" title="Remove photo" aria-label="Remove photo">×</button>
  </div>

  <!-- Analyze button -->
  <button class="btn btn-primary" id="analyze-btn" disabled>Analyze Board</button>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Analyzing board position…</p>
    <p class="sub">This takes about 5–10 seconds</p>
  </div>

  <!-- Error -->
  <div id="error-box"></div>

  <!-- Results -->
  <div id="results">

    <!-- Mode toggle -->
    <div class="mode-toggle" role="group" aria-label="View mode">
      <button class="mode-btn active" data-mode="analysis">Analysis</button>
      <button class="mode-btn" data-mode="tutorial">Tutorial</button>
    </div>

    <!-- Move card (shared turn badge, switches content by mode) -->
    <div class="card">
      <div class="card-header" id="move-card-header">Best Move</div>
      <div class="card-body">
        <div class="turn-badge" id="turn-badge"></div>

        <!-- Analysis view -->
        <div id="analysis-view">
          <div class="best-move" id="best-move"></div>
          <div class="move-squares" id="move-squares"></div>
        </div>

        <!-- Tutorial view -->
        <div id="tutorial-view">
          <div class="step-number">Your next move</div>
          <div class="step-instruction" id="step-instruction"></div>
          <div class="step-notation" id="step-notation"></div>
        </div>
      </div>
    </div>

    <!-- Full-width board -->
    <div class="card" id="board-card">
      <div class="card-header">Board Position</div>
      <div class="board-wrap">
        <div class="board-svg-wrap" id="board-svg-wrap">
          <div class="board-outer" id="board-outer"></div>
          <!-- SVG arrow overlay (tutorial mode only) -->
          <svg id="board-arrow" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arrowhead" markerWidth="6" markerHeight="5"
                      refX="5.5" refY="2.5" orient="auto">
                <polygon points="0 0, 6 2.5, 0 5" fill="#b794f4"/>
              </marker>
            </defs>
            <line id="arrow-line"
                  stroke="#b794f4" stroke-linecap="round" opacity="0.88"
                  marker-end="url(#arrowhead)"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Analysis / explanation card -->
    <div class="card">
      <div class="card-header" id="analysis-header">Analysis</div>
      <div class="card-body">
        <p class="explanation" id="explanation"></p>
        <p class="fen-text" id="fen-display"></p>
      </div>
    </div>

    <button class="btn btn-outline" id="new-btn">Analyze Another Position</button>
  </div>

</div>

<script>
  const PIECES_MAP = {
    'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
    'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟'
  };
  const PIECE_NAMES = {
    'K':'King','Q':'Queen','R':'Rook','B':'Bishop','N':'Knight','P':'Pawn',
    'k':'King','q':'Queen','r':'Rook','b':'Bishop','n':'Knight','p':'Pawn'
  };

  let selectedFile  = null;
  let currentMode   = 'analysis'; // 'analysis' | 'tutorial'
  let lastData      = null;
  let lastSqSz      = 40;

  const cameraInput  = document.getElementById('camera-input');
  const galleryInput = document.getElementById('gallery-input');
  const previewWrap  = document.getElementById('preview-wrap');
  const preview      = document.getElementById('preview');
  const clearBtn     = document.getElementById('clear-btn');
  const analyzeBtn   = document.getElementById('analyze-btn');
  const loading      = document.getElementById('loading');
  const loadingMsg   = document.getElementById('loading-msg');
  const errorBox     = document.getElementById('error-box');
  const results      = document.getElementById('results');

  // ── File input handlers ──────────────────────────────────────────────────

  function onFileSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    const objUrl = URL.createObjectURL(file);
    preview.onload = () => URL.revokeObjectURL(objUrl);
    preview.src = objUrl;
    previewWrap.style.display = 'block';
    analyzeBtn.disabled = false;
    hide(results);
    hide(errorBox);
    e.target.value = '';
  }

  cameraInput.addEventListener('change', onFileSelected);
  galleryInput.addEventListener('change', onFileSelected);
  clearBtn.addEventListener('click', reset);
  document.getElementById('new-btn').addEventListener('click', reset);

  // ── Mode toggle ──────────────────────────────────────────────────────────

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.mode !== currentMode) setMode(btn.dataset.mode);
    });
  });

  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    if (lastData) applyMode(lastData);
  }

  function applyMode(data) {
    const isTutorial = currentMode === 'tutorial';
    const boardCard  = document.getElementById('board-card');
    const arrow      = document.getElementById('board-arrow');
    const analysisH  = document.getElementById('analysis-header');

    // Move card content
    document.getElementById('analysis-view').style.display = isTutorial ? 'none' : 'block';
    document.getElementById('tutorial-view').style.display = isTutorial ? 'block' : 'none';
    document.getElementById('move-card-header').textContent = isTutorial ? 'Your Move' : 'Best Move';

    // Board: pulse animation class + arrow
    boardCard.classList.toggle('tutorial-active', isTutorial);
    arrow.style.display = (isTutorial && data.from && data.to) ? 'block' : 'none';

    // Explanation header
    analysisH.textContent = isTutorial ? 'Why this works' : 'Analysis';
  }

  // ── Analyze ──────────────────────────────────────────────────────────────

  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    analyzeBtn.disabled = true;
    show(loading);
    hide(results);
    hide(errorBox);

    try {
      loadingMsg.textContent = 'Preparing image…';
      const compressed = await compressImage(selectedFile);

      loadingMsg.textContent = 'Analyzing board position…';
      const formData = new FormData();
      formData.append('image', compressed, 'board.jpg');

      const res  = await fetch('/api/analyze', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok || data.error) throw new Error(data.error || 'Analysis failed');

      renderResults(data);
    } catch (err) {
      showError(err.message || 'Something went wrong. Please try again.');
    } finally {
      hide(loading);
      loadingMsg.textContent = 'Analyzing board position…';
      analyzeBtn.disabled = false;
    }
  });

  // ── Render ───────────────────────────────────────────────────────────────

  function renderResults(data) {
    lastData = data;

    const isWhite = (data.turn || 'white') === 'white';

    // Turn badge
    document.getElementById('turn-badge').textContent =
      `${isWhite ? '♔' : '♚'} ${isWhite ? 'White' : 'Black'} to move`;

    // Analysis view
    document.getElementById('best-move').textContent = data.move;
    document.getElementById('move-squares').textContent =
      (data.from && data.to) ? `${data.from.toUpperCase()} → ${data.to.toUpperCase()}` : '';

    // Tutorial view
    const pieceName = getPieceName(data.fen, data.from);
    document.getElementById('step-instruction').textContent =
      `Move your ${pieceName} to ${data.to ? data.to.toUpperCase() : data.move}`;
    document.getElementById('step-notation').textContent =
      (data.from && data.to)
        ? `${data.from.toUpperCase()} → ${data.to.toUpperCase()} · ${data.move}`
        : data.move;

    // Explanation
    document.getElementById('explanation').textContent = data.explanation;
    document.getElementById('fen-display').textContent = 'FEN: ' + data.fen;

    // Board
    const sqSz = calcSqSz();
    lastSqSz = sqSz;
    renderBoard(data.fen, data.from, data.to, sqSz);
    updateArrow(data.from, data.to, sqSz);

    // Apply current mode visuals
    applyMode(data);

    show(results);
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function calcSqSz() {
    // Fill the card width: container is capped at 480px, padding 1.25rem each side
    const containerW = Math.min(window.innerWidth, 480) - 40;
    // 18px rank label + 8 squares; subtract a little breathing room
    return Math.floor((containerW - 18 - 4) / 8);
  }

  function renderBoard(fen, fromSq, toSq, sqSz) {
    const rows    = parseFen(fen);
    const fromIdx = sqToIdx(fromSq);
    const toIdx   = sqToIdx(toSq);
    const pxSz    = sqSz + 'px';

    const outer = document.getElementById('board-outer');
    outer.innerHTML = '';

    for (let r = 0; r < 8; r++) {
      const row = document.createElement('div');
      row.className = 'board-row';

      const rl = document.createElement('div');
      rl.className = 'rank-lbl';
      rl.style.height = pxSz;
      rl.textContent = 8 - r;
      row.appendChild(rl);

      for (let f = 0; f < 8; f++) {
        const sq = document.createElement('div');
        sq.className = 'sq ' + ((r + f) % 2 === 0 ? 'sq-light' : 'sq-dark');
        sq.style.width  = pxSz;
        sq.style.height = pxSz;

        const isFrom = fromIdx && fromIdx.r === r && fromIdx.f === f;
        const isTo   = toIdx   && toIdx.r   === r && toIdx.f   === f;
        if (isFrom) sq.classList.add('sq-from');
        if (isTo)   sq.classList.add('sq-to');

        const piece = rows[r][f];
        if (piece) {
          const span = document.createElement('span');
          span.className = 'piece ' + (piece === piece.toUpperCase() ? 'piece-white' : 'piece-black');
          span.style.fontSize = Math.floor(sqSz * 0.72) + 'px';
          span.textContent = PIECES_MAP[piece] || '';
          sq.appendChild(span);
        } else if (isTo) {
          sq.classList.add('sq-to-dot');
        }

        row.appendChild(sq);
      }
      outer.appendChild(row);
    }

    // File labels
    const fileRow = document.createElement('div');
    fileRow.className = 'file-row';
    for (const f of ['a','b','c','d','e','f','g','h']) {
      const lbl = document.createElement('div');
      lbl.className = 'file-lbl';
      lbl.style.width = pxSz;
      lbl.textContent = f;
      fileRow.appendChild(lbl);
    }
    outer.appendChild(fileRow);

    // Size the SVG overlay to match the board grid (not the file labels)
    const svgW = 18 + 8 * sqSz;
    const svgH = 8 * sqSz;
    const arrow = document.getElementById('board-arrow');
    arrow.setAttribute('width',  svgW);
    arrow.setAttribute('height', svgH);
  }

  function updateArrow(fromSq, toSq, sqSz) {
    const fromIdx = sqToIdx(fromSq);
    const toIdx   = sqToIdx(toSq);
    if (!fromIdx || !toIdx) return;

    const RANK_W = 18;
    const cx = (idx) => RANK_W + idx.f * sqSz + sqSz / 2;
    const cy = (idx) => idx.r * sqSz + sqSz / 2;

    const x1 = cx(fromIdx), y1 = cy(fromIdx);
    const x2 = cx(toIdx),   y2 = cy(toIdx);

    // Shorten end so arrowhead tip lands at edge of destination square
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const pullBack = sqSz * 0.28;
    const ex = x2 - (dx / len) * pullBack;
    const ey = y2 - (dy / len) * pullBack;

    // Shorten start slightly too so it doesn't overlap the piece
    const startPush = sqSz * 0.28;
    const sx = x1 + (dx / len) * startPush;
    const sy = y1 + (dy / len) * startPush;

    const line = document.getElementById('arrow-line');
    line.setAttribute('x1', sx.toFixed(1));
    line.setAttribute('y1', sy.toFixed(1));
    line.setAttribute('x2', ex.toFixed(1));
    line.setAttribute('y2', ey.toFixed(1));
    line.setAttribute('stroke-width', Math.max(4, Math.round(sqSz * 0.16)));
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  function getPieceName(fen, sq) {
    if (!sq) return 'piece';
    const board = parseFen(fen);
    const idx   = sqToIdx(sq);
    if (!idx) return 'piece';
    return PIECE_NAMES[board[idx.r][idx.f]] || 'piece';
  }

  function parseFen(fen) {
    const grid = [];
    for (const rowStr of fen.split(' ')[0].split('/')) {
      const rank = [];
      for (const ch of rowStr) {
        if (/\d/.test(ch)) for (let i = 0; i < parseInt(ch); i++) rank.push('');
        else rank.push(ch);
      }
      grid.push(rank);
    }
    return grid;
  }

  function sqToIdx(sq) {
    if (!sq || sq.length < 2) return null;
    const f = sq.toLowerCase().charCodeAt(0) - 97;
    const r = 8 - parseInt(sq[1]);
    if (f < 0 || f > 7 || r < 0 || r > 7) return null;
    return { r, f };
  }

  /**
   * Resize to maxDim on longest side and export as JPEG via Canvas.
   * Automatically converts HEIC/HEIF (Safari decodes them before canvas draw).
   */
  function compressImage(file, maxDim = 1400, quality = 0.88) {
    return new Promise((resolve) => {
      const img    = new Image();
      const objUrl = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(objUrl);
        let { naturalWidth: w, naturalHeight: h } = img;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else        { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => resolve(blob || file), 'image/jpeg', quality);
      };
      img.onerror = () => { URL.revokeObjectURL(objUrl); resolve(file); };
      img.src = objUrl;
    });
  }

  function show(el) { el.style.display = 'block'; }
  function hide(el) { el.style.display = 'none'; }

  function showError(msg) {
    errorBox.textContent = '⚠ ' + msg;
    show(errorBox);
  }

  function reset() {
    selectedFile = null;
    lastData = null;
    preview.src = '';
    previewWrap.style.display = 'none';
    analyzeBtn.disabled = true;
    cameraInput.value  = '';
    galleryInput.value = '';
    hide(results);
    hide(errorBox);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
